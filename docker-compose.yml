version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: panitia-kurban-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: panitia_kurban
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
