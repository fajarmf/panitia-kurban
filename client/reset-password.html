<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Panitia Kurban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="login-card w-full max-w-md p-8 relative z-10">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-emerald-100">Reset Password</h1>
      <p class="text-sm text-emerald-300/60 mt-1">Masukkan password baru Anda.</p>
    </div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label for="password">Password Baru</label>
        <input type="password" id="password" class="input-field" placeholder="Masukkan password baru" required minlength="6">
      </div>
      <button type="submit" class="btn-primary w-full mt-4" id="submit-btn">Simpan Password</button>
      <div class="text-center mt-4">
        <a href="/" class="text-sm text-emerald-300 hover:text-emerald-100">Kembali ke Login</a>
      </div>
    </form>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function handleReset(e) {
      e.preventDefault();
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) {
        showToast('Token reset password tidak ditemukan pada URL', 'error');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px;"></div>';

      try {
        const data = await api('/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password: document.getElementById('password').value })
        }, false);
        showToast(data.message || 'Password berhasil diubah', 'success');
        setTimeout(() => window.location.href = '/', 2000);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Simpan Password';
      }
    }
  </script>
</body>
</html>
