<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengkurban - Panitia Kurban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1>🕌 Al Hijrah CGE</h1><p>Sistem Panitia Kurban</p></div>
    <nav class="sidebar-nav"></nav>
  </aside>
  <nav class="bottom-nav" id="bottom-nav"><div class="bottom-nav-items"></div></nav>

  <main class="main-content">
    <div class="top-bar">
      <div class="flex items-center gap-3">
        <button class="hamburger" onclick="toggleSidebar()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <h2>Data Pengkurban</h2>
      </div>
      <div class="user-info" id="user-info"></div>
    </div>

    <div class="flex flex-col sm:flex-row justify-between gap-3 mb-4">
      <div class="flex gap-2 flex-wrap">
        <select id="event-filter" class="input-field" style="max-width:280px" onchange="loadData()"></select>
        <select id="status-filter" class="input-field" style="max-width:220px" onchange="loadData()">
          <option value="">Semua Status</option>
          <option value="PENDING_PAYMENT">Menunggu Pembayaran</option>
          <option value="PENDING_VERIFICATION">Menunggu Verifikasi</option>
          <option value="CONFIRMED">Terkonfirmasi</option>
          <option value="REJECTED">Ditolak</option>
        </select>
      </div>
      <div class="flex gap-2">
        <button class="btn-secondary" onclick="openRekapModal()">📋 Rekap WA</button>
        <button class="btn-secondary" onclick="exportCsv()">📥 Export CSV</button>
        <button class="btn-primary" onclick="openModal()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Tambah
        </button>
      </div>
    </div>

    <div class="glass-card p-4">
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr>
              <th>No. Reg</th>
              <th>Nama Pendaftar</th>
              <th>Atas Nama Qurban</th>
              <th>Jenis Hewan</th>
              <th>Perkiraan Total</th>
              <th>Alamat</th>
              <th>Bukti</th>
              <th>Status</th>
              <th>Infaq</th>
              <th>Konfirmasi</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="data-table">
            <tr><td colspan="11" class="text-center py-8"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add/Edit modal -->
  <div class="modal-overlay" id="pk-modal">
    <div class="modal-content">
      <div class="modal-header"><h3 id="modal-title">Tambah Pengkurban</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <form onsubmit="saveData(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Event</label><select id="form-event" class="input-field" required></select></div>
        <div class="form-group"><label>Nama Pendaftar</label><input type="text" id="form-name" class="input-field" required placeholder="Nama lengkap pendaftar"></div>
        <div class="form-group"><label>Atas Nama Qurban (Shohibul)</label><textarea id="form-shohibul" class="input-field" rows="2" placeholder="Kosongkan jika sama dengan pendaftar. Sapi kolektif: satu nama per baris."></textarea></div>
        <div class="form-group"><label>Alamat</label><input type="text" id="form-address" class="input-field" placeholder="contoh: Margata - M7/38"></div>
        <div class="form-group"><label>Jenis Hewan</label>
          <select id="form-animal" class="input-field" required>
            <option value="DOMBA">Domba 🐑</option>
            <option value="KAMBING">Kambing 🐐</option>
            <option value="SAPI_KOLEKTIF_A">Sapi Kolektif A — 350-400 kg 🐄</option>
            <option value="SAPI_KOLEKTIF_B">Sapi Kolektif B — 320-350 kg 🐄</option>
            <option value="SAPI_KOLEKTIF_C">Sapi Kolektif C — 320-350 kg 🐄</option>
            <option value="SAPI_PERORANGAN">Sapi Perorangan 🐄</option>
          </select>
        </div>
        <div class="form-group"><label>Tipe Akad</label>
          <select id="form-purchase" class="input-field" required>
            <option value="BELI_MASJID">Beli via Masjid</option>
            <option value="BAWA_SENDIRI">Bawa Sendiri</option>
          </select>
        </div>
        <div class="form-group"><label>No. Telepon</label><input type="tel" id="form-phone" class="input-field" placeholder="08xxxxxxxxxx"></div>
        <div class="form-group"><label>Catatan</label><textarea id="form-notes" class="input-field" rows="2" placeholder="Catatan (opsional)"></textarea></div>
        <div class="flex gap-3 mt-6">
          <button type="button" class="btn-secondary flex-1" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn-primary flex-1">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Rekap WA modal -->
  <div class="modal-overlay" id="rekap-modal">
    <div class="modal-content" style="max-width:540px">
      <div class="modal-header">
        <h3>Rekap WA</h3>
        <button class="modal-close" onclick="closeRekapModal()">✕</button>
      </div>
      <textarea id="rekap-text" class="input-field" rows="16" readonly style="font-size:13px;line-height:1.6;font-family:monospace;resize:vertical"></textarea>
      <div class="flex gap-3 mt-4">
        <button type="button" class="btn-secondary flex-1" onclick="closeRekapModal()">Tutup</button>
        <button type="button" class="btn-primary flex-1" onclick="salinRekap(this)">📋 Salin</button>
      </div>
    </div>
  </div>

  <!-- Konfirmasi Teknis detail modal -->
  <div class="modal-overlay" id="konfirmasi-modal">
    <div class="modal-content" style="max-width:540px">
      <div class="modal-header">
        <h3 id="konfirmasi-modal-title">Konfirmasi Teknis</h3>
        <button class="modal-close" onclick="closeKonfirmasiModal()">✕</button>
      </div>
      <div id="konfirmasiTeknisContent" class="text-sm py-2">
        <p class="text-white/40">Loading...</p>
      </div>
      <div class="flex gap-3 mt-4">
        <button type="button" class="btn-secondary flex-1" onclick="closeKonfirmasiModal()">Tutup</button>
      </div>
    </div>
  </div>

  <!-- Verify modal -->
  <div class="modal-overlay" id="verify-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="verify-modal-title">Verifikasi Pembayaran</h3>
        <button class="modal-close" onclick="closeVerifyModal()">✕</button>
      </div>
      <div id="verify-proof-wrap" style="margin-bottom:1rem;display:none"></div>
      <p id="verify-no-proof" class="text-sm text-yellow-300/70 mb-3" style="display:none">⚠️ Belum ada bukti pembayaran yang diunggah.</p>
      <div class="form-group">
        <label>Catatan Verifikasi (opsional)</label>
        <textarea id="verify-notes" class="input-field" rows="2" placeholder="Catatan"></textarea>
      </div>
      <input type="hidden" id="verify-id">
      <div class="flex gap-3 mt-4">
        <button type="button" class="btn-secondary flex-1" onclick="closeVerifyModal()">Batal</button>
        <button type="button" class="btn-danger flex-1" onclick="submitVerify('REJECTED')">Tolak</button>
        <button type="button" class="btn-primary flex-1" onclick="submitVerify('CONFIRMED')">✓ Konfirmasi</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');
    initSidebar('pengkurban');

    const animalLabels = {
      SAPI: 'Sapi 🐄', KAMBING: 'Kambing 🐐', DOMBA: 'Domba 🐑',
      SAPI_KOLEKTIF: 'Sapi Kolektif 🐄',
      SAPI_KOLEKTIF_A: 'Sapi Kolektif A 🐄', SAPI_KOLEKTIF_B: 'Sapi Kolektif B 🐄',
      SAPI_KOLEKTIF_C: 'Sapi Kolektif C 🐄',
      SAPI_PERORANGAN: 'Sapi Perorangan 🐄',
    };
    const purchaseLabels = { BELI_MASJID: 'Beli via Masjid', BAWA_SENDIRI: 'Bawa Sendiri' };
    let PRICING = null;
    async function loadPricingCatalog() {
      try {
        const res = await fetch('/api/public/pricing');
        PRICING = await res.json();
      } catch (e) {
        console.error('[pricing-catalog]', e.stack || e.message);
        PRICING = null;
      }
    }

    function getInfaq(animalType) {
      if (!PRICING) return 0;
      if (animalType === 'SAPI_PERORANGAN') return PRICING.sapiPerorangan.infaq;
      if (animalType === 'SAPI_KOLEKTIF_A') return PRICING.sapiKolektif.opsiA.infaq;
      if (animalType === 'SAPI_KOLEKTIF_B') return PRICING.sapiKolektif.opsiB.infaq;
      if (animalType === 'SAPI_KOLEKTIF_C') return PRICING.sapiKolektif.opsiC.infaq;
      if (animalType === 'SAPI_KOLEKTIF') return PRICING.sapiKolektif.opsiA.infaq;
      if (animalType === 'KAMBING' || animalType === 'DOMBA') return PRICING.kambing[0].infaq;
      return 0;
    }

    function computeExpectedTotal(row) {
      if (!PRICING) return '(loading...)';
      const at = row.animalType;
      const infaq = getInfaq(at);
      const fmt = (n) => n.toLocaleString('id-ID');

      if (at === 'SAPI_KOLEKTIF_A') {
        return `Rp ${fmt(PRICING.sapiKolektif.opsiA.perOrang + infaq)} <span class="text-white/50 text-xs">(${fmt(PRICING.sapiKolektif.opsiA.perOrang)}+${fmt(infaq)})</span>`;
      }
      if (at === 'SAPI_KOLEKTIF_B') {
        return `Rp ${fmt(PRICING.sapiKolektif.opsiB.perOrang)} <span class="text-white/50 text-xs">(sudah termasuk infaq ${fmt(infaq)})</span>`;
      }
      if (at === 'SAPI_KOLEKTIF_C') {
        return `Rp ${fmt(PRICING.sapiKolektif.opsiC.perOrang)} <span class="text-white/50 text-xs">(sudah termasuk infaq ${fmt(infaq)})</span>`;
      }
      if (at === 'SAPI_PERORANGAN') {
        if (row.price == null) return '<span class="text-yellow-400">(harga belum diisi)</span>';
        const p = Number(row.price);
        return `Rp ${fmt(p + infaq)} <span class="text-white/50 text-xs">(${fmt(p)}+${fmt(infaq)})</span>`;
      }
      if (at === 'KAMBING' || at === 'DOMBA') {
        if (row.price != null) {
          const p = Number(row.price);
          return `Rp ${fmt(p + infaq)} <span class="text-white/50 text-xs">(${fmt(p)}+${fmt(infaq)})</span>`;
        }
        const catalog = at === 'KAMBING' ? PRICING.kambing : PRICING.domba;
        const tier = catalog.find(t => t.size === row.animalSize);
        if (!tier) return '<span class="text-yellow-400">(tier belum diisi)</span>';
        if (tier.price != null) {
          return `Rp ${fmt(tier.price + infaq)} <span class="text-white/50 text-xs">(${fmt(tier.price)}+${fmt(infaq)})</span>`;
        }
        if (tier.priceMin != null) {
          return `Rp ${fmt(tier.priceMin + infaq)}-${fmt(tier.priceMax + infaq)} <span class="text-white/50 text-xs">(range ${tier.size})</span>`;
        }
        return `<span class="text-white/70">${tier.priceNote || '-'}</span>`;
      }
      return '-';
    }
    const statusLabels = {
      PENDING_PAYMENT: 'Menunggu Pembayaran',
      PENDING_VERIFICATION: 'Menunggu Verifikasi',
      CONFIRMED: 'Terkonfirmasi',
      REJECTED: 'Ditolak',
    };
    const statusBadge = {
      PENDING_PAYMENT: 'badge-claimed',
      PENDING_VERIFICATION: 'badge-pending',
      CONFIRMED: 'badge-active',
      REJECTED: 'badge-rejected',
    };

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // Pre-apply status filter from URL param (e.g. from dashboard quick-link)
    const urlStatus = new URLSearchParams(location.search).get('status');
    if (urlStatus) document.getElementById('status-filter').value = urlStatus;

    Promise.all([loadPricingCatalog(), loadEventOptions('event-filter', true)])
      .then(() => loadData());
    loadEventOptions('form-event');

    // Urutan grouping mirrors rekap WA section order
    const GROUP_ORDER = [
      'SAPI_KOLEKTIF_A', 'SAPI_KOLEKTIF_B', 'SAPI_KOLEKTIF_C', 'SAPI_KOLEKTIF',
      'SAPI_PERORANGAN', 'KAMBING', 'DOMBA',
    ];
    const GROUP_HEADERS = {
      SAPI_KOLEKTIF_A: '🐄 Sapi Kolektif A — 350-400 kg',
      SAPI_KOLEKTIF_B: '🐄 Sapi Kolektif B — 320-350 kg',
      SAPI_KOLEKTIF_C: '🐄 Sapi Kolektif C — 320-350 kg',
      SAPI_KOLEKTIF: '🐄 Sapi Kolektif (legacy)',
      SAPI_PERORANGAN: '🐄 Sapi Perorangan',
      KAMBING: '🐐 Kambing',
      DOMBA: '🐑 Domba',
    };

    function missing(value, icon) {
      return value
        ? `<span class="text-xs text-white/60">${escHtml(value)}</span>`
        : `<span class="text-xs text-yellow-400/80" title="Belum diisi">${icon} belum diisi</span>`;
    }

    function renderPengkurbanRow(d) {
      const proofs = d.paymentProofPaths || [];
      const proofHtml = proofs.length
        ? proofs.map((p, i) => `<button class="btn-secondary btn-sm" onclick="showLightbox('/api/${escHtml(p)}')">${proofs.length > 1 ? `Bukti ${i+1}` : 'Lihat'}</button>`).join(' ')
        : (d.purchaseType === 'BAWA_SENDIRI'
            ? '<span class="text-white/30 text-xs" title="Bawa sendiri — bukti transfer tidak diperlukan">—</span>'
            : '<span class="text-yellow-400/80 text-xs" title="Belum upload bukti">⚠️ belum upload</span>');

      const canVerify = d.status === 'PENDING_VERIFICATION' || d.status === 'PENDING_PAYMENT';
      const verifyBtn = canVerify
        ? `<button class="btn-primary btn-sm" onclick='openVerifyModal(${escHtml(JSON.stringify(d))})'>Verifikasi</button>`
        : '';

      const infaqAmt = getInfaq(d.animalType);
      const infaqBadge = d.infaqPaid
        ? `<span class="badge badge-active" title="Lunas ${d.infaqPaidAt ? new Date(d.infaqPaidAt).toLocaleDateString('id-ID') : ''}">✓ Lunas</span>`
        : `<span class="badge badge-pending">Belum</span>`;
      const infaqBtn = `<button class="btn-secondary btn-sm" onclick="toggleInfaq('${d.id}', ${!d.infaqPaid})">${d.infaqPaid ? 'Batalkan' : 'Tandai Lunas'}</button>`;

      // Phone shown under name. Yellow indicator kalau missing — biar gampang
      // di-spot pas reconcile.
      const phoneHtml = d.phone
        ? `<div class="text-xs text-white/50">📱 ${escHtml(d.phone)}</div>`
        : `<div class="text-xs text-yellow-400/80" title="No. HP belum diisi">📱 belum diisi</div>`;

      return `<tr>
        <td class="text-xs font-mono text-emerald-300/70">${escHtml(d.registrationNumber || '—')}</td>
        <td><div class="font-semibold">${escHtml(d.name)}</div>${phoneHtml}</td>
        <td class="text-xs text-white/70">${escHtml(d.shohibulName || '—')}</td>
        <td>${escHtml(animalLabels[d.animalType] || d.animalType)}</td>
        <td class="text-xs text-white/70">${computeExpectedTotal(d)}</td>
        <td>${missing(d.address, '📍')}</td>
        <td>${proofHtml}</td>
        <td><span class="badge ${statusBadge[d.status] || ''}">${statusLabels[d.status] || d.status}</span></td>
        <td><div class="flex flex-col gap-1 items-start">
          <span class="text-xs text-white/60">Rp ${infaqAmt.toLocaleString('id-ID')}</span>
          ${infaqBadge}
        </div></td>
        ${d.konfirmasi_teknis_submitted_at
          ? `<td class="text-center" title="Submitted: ${new Date(d.konfirmasi_teknis_submitted_at).toLocaleString('id-ID')}"><button class="text-green-400 hover:text-green-300 cursor-pointer" onclick='openKonfirmasiModal(${escHtml(JSON.stringify(d.id))}, ${escHtml(JSON.stringify(d.name))})'>✓</button></td>`
          : `<td class="text-center"><button class="text-white/30 hover:text-yellow-400/70 cursor-pointer text-xs" onclick='openKonfirmasiModal(${escHtml(JSON.stringify(d.id))}, ${escHtml(JSON.stringify(d.name))})'>—</button></td>`}
        <td><div class="flex gap-2 flex-wrap">
          ${verifyBtn}
          ${infaqBtn}
          <button class="btn-secondary btn-sm" onclick='editData(${escHtml(JSON.stringify(d))})'>Edit</button>
          <button class="btn-danger btn-sm" onclick="deleteData('${d.id}')">Hapus</button>
        </div></td>
      </tr>`;
    }

    function renderGroupHeader(label, count) {
      return `<tr class="bg-emerald-900/40">
        <td colspan="11" class="font-semibold text-emerald-200 py-2 px-3">
          ${label}
          <span class="text-emerald-400/60 text-xs ml-2">(${count} orang)</span>
        </td>
      </tr>`;
    }

    async function loadData() {
      const eventId = document.getElementById('event-filter').value;
      const status = document.getElementById('status-filter').value;
      const params = new URLSearchParams();
      if (eventId) params.set('eventId', eventId);
      try {
        let data = await api(`/pengkurban?${params}`);
        if (status) data = data.filter(d => d.status === status);

        const tbody = document.getElementById('data-table');
        if (!data.length) {
          tbody.innerHTML = '<tr><td colspan="11" class="text-center py-8 text-emerald-300/40">Belum ada data pengkurban</td></tr>';
          return;
        }

        // Group by animal_type, sort within group by createdAt ASC
        const groups = {};
        data.forEach(d => {
          const key = d.animalType || 'UNKNOWN';
          (groups[key] ||= []).push(d);
        });
        Object.values(groups).forEach(rows =>
          rows.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0))
        );

        // Render in defined order, then any unknown types at the end
        const html = [];
        for (const key of GROUP_ORDER) {
          const rows = groups[key];
          if (!rows || !rows.length) continue;
          html.push(renderGroupHeader(GROUP_HEADERS[key] || key, rows.length));
          html.push(rows.map(renderPengkurbanRow).join(''));
        }
        for (const key of Object.keys(groups)) {
          if (GROUP_ORDER.includes(key)) continue;
          html.push(renderGroupHeader(key, groups[key].length));
          html.push(groups[key].map(renderPengkurbanRow).join(''));
        }

        tbody.innerHTML = html.join('');
      } catch (err) { showToast('Gagal memuat data', 'error'); }
    }

    async function exportCsv() {
      const eventId = document.getElementById('event-filter').value;
      const params = eventId ? `?eventId=${eventId}` : '';
      try {
        const token = getToken();
        const res = await fetch(`/api/pengkurban/export${params}`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Gagal export CSV');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'pengkurban-export.csv'; a.click();
        URL.revokeObjectURL(url);
        showToast('Berhasil export CSV');
      } catch (err) { showToast(err.message, 'error'); }
    }

    function openModal() {
      document.getElementById('modal-title').textContent = 'Tambah Pengkurban';
      document.getElementById('edit-id').value = '';
      document.getElementById('form-name').value = '';
      document.getElementById('form-shohibul').value = '';
      document.getElementById('form-address').value = '';
      document.getElementById('form-animal').value = 'DOMBA';
      document.getElementById('form-purchase').value = 'BELI_MASJID';
      document.getElementById('form-phone').value = '';
      document.getElementById('form-notes').value = '';
      document.getElementById('pk-modal').classList.add('active');
    }

    function editData(d) {
      document.getElementById('modal-title').textContent = 'Edit Pengkurban';
      document.getElementById('edit-id').value = d.id;
      document.getElementById('form-event').value = d.eventId;
      document.getElementById('form-name').value = d.name;
      document.getElementById('form-shohibul').value = d.shohibulName || '';
      document.getElementById('form-address').value = d.address || '';
      document.getElementById('form-animal').value = d.animalType;
      document.getElementById('form-purchase').value = d.purchaseType;
      document.getElementById('form-phone').value = d.phone || '';
      document.getElementById('form-notes').value = d.notes || '';
      document.getElementById('pk-modal').classList.add('active');
    }

    function closeModal() { document.getElementById('pk-modal').classList.remove('active'); }

    async function saveData(ev) {
      ev.preventDefault();
      const id = document.getElementById('edit-id').value;
      const data = {
        eventId: document.getElementById('form-event').value,
        name: document.getElementById('form-name').value,
        shohibulName: document.getElementById('form-shohibul').value || null,
        address: document.getElementById('form-address').value,
        animalType: document.getElementById('form-animal').value,
        purchaseType: document.getElementById('form-purchase').value,
        phone: document.getElementById('form-phone').value,
        notes: document.getElementById('form-notes').value,
      };
      try {
        if (id) { await api(`/pengkurban/${id}`, { method: 'PATCH', body: JSON.stringify(data) }); showToast('Data diupdate'); }
        else { await api('/pengkurban', { method: 'POST', body: JSON.stringify(data) }); showToast('Data ditambahkan'); }
        closeModal(); loadData();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteData(id) {
      if (!confirmAction('Yakin ingin menghapus data ini?')) return;
      try { await api(`/pengkurban/${id}`, { method: 'DELETE' }); showToast('Data dihapus'); loadData(); }
      catch (err) { showToast(err.message, 'error'); }
    }

    function openVerifyModal(d) {
      document.getElementById('verify-id').value = d.id;
      document.getElementById('verify-modal-title').textContent = `Verifikasi — ${d.name}`;
      document.getElementById('verify-notes').value = '';
      const proofWrap = document.getElementById('verify-proof-wrap');
      const noProof = document.getElementById('verify-no-proof');
      const proofs = d.paymentProofPaths || [];
      if (proofs.length) {
        proofWrap.innerHTML = '<p class="text-sm text-white/60 mb-2">Bukti Pembayaran:</p>' +
          proofs.map(p => `<img src="/api/${escHtml(p)}" alt="Bukti" style="max-width:100%;border-radius:8px;max-height:300px;object-fit:contain;cursor:zoom-in;margin-bottom:8px;display:block" onclick="showLightbox(this.src)">`).join('');
        proofWrap.style.display = 'block';
        noProof.style.display = 'none';
      } else {
        proofWrap.innerHTML = '';
        proofWrap.style.display = 'none';
        noProof.style.display = 'block';
      }
      document.getElementById('verify-modal').classList.add('active');
    }

    function closeVerifyModal() { document.getElementById('verify-modal').classList.remove('active'); }

    async function toggleInfaq(id, paid) {
      try {
        await api(`/pengkurban/${id}/infaq`, {
          method: 'PATCH',
          body: JSON.stringify({ paid }),
        });
        showToast(paid ? 'Infaq ditandai lunas' : 'Status infaq dibatalkan');
        loadData();
      } catch (err) { showToast('Gagal update infaq: ' + err.message, 'error'); }
    }

    async function openRekapModal() {
      const eventId = document.getElementById('event-filter').value;
      const params = new URLSearchParams();
      if (eventId) params.set('eventId', eventId);
      try {
        const res = await api(`/rekap/pengkurban?${params}`);
        document.getElementById('rekap-text').value = res.text;
        document.getElementById('rekap-modal').classList.add('active');
      } catch (err) { showToast('Gagal memuat rekap', 'error'); }
    }

    function closeRekapModal() { document.getElementById('rekap-modal').classList.remove('active'); }

    function salinRekap(btn) {
      const text = document.getElementById('rekap-text').value;
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Tersalin!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }

    async function submitVerify(status) {
      const id = document.getElementById('verify-id').value;
      const notes = document.getElementById('verify-notes').value.trim();
      try {
        await api(`/pengkurban/${id}/verify`, {
          method: 'PATCH',
          body: JSON.stringify({ status, notes: notes || undefined }),
        });
        showToast(status === 'CONFIRMED' ? 'Pendaftaran dikonfirmasi' : 'Pendaftaran ditolak');
        closeVerifyModal();
        loadData();
      } catch (err) { showToast(err.message, 'error'); }
    }

    const KONFIRMASI_FORM_KEY = 'konfirmasi_teknis_1447h';
    const KONFIRMASI_SKIP_KEYS = new Set(['Timestamp', 'Nama Sohibul Qurban']);

    function openKonfirmasiModal(pengkurbanId, name) {
      document.getElementById('konfirmasi-modal-title').textContent = `Konfirmasi Teknis — ${name}`;
      document.getElementById('konfirmasiTeknisContent').innerHTML = '<p class="text-white/40">Loading...</p>';
      document.getElementById('konfirmasi-modal').classList.add('active');
      loadKonfirmasiTeknis(pengkurbanId);
    }

    function closeKonfirmasiModal() {
      document.getElementById('konfirmasi-modal').classList.remove('active');
    }

    async function loadKonfirmasiTeknis(pengkurbanId) {
      const container = document.getElementById('konfirmasiTeknisContent');
      try {
        const res = await fetch(
          `/api/form-responses?pengkurban_id=${encodeURIComponent(pengkurbanId)}&form_key=${KONFIRMASI_FORM_KEY}`,
          { headers: { 'Authorization': `Bearer ${getToken()}` } }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const result = await res.json();

        if (result.submitted) {
          const rows = Object.entries(result.data)
            .filter(([k]) => !KONFIRMASI_SKIP_KEYS.has(k))
            .map(([k, v]) => `
              <div class="mb-3">
                <div class="text-white/50 text-xs mb-0.5">${escHtml(k)}</div>
                <div class="text-white/90">${escHtml(v || '(kosong)')}</div>
              </div>
            `).join('');
          const submittedAt = new Date(result.form_submitted_at).toLocaleString('id-ID');
          container.innerHTML = `
            <p class="text-xs text-white/40 mb-4">Submitted: ${escHtml(submittedAt)}</p>
            ${rows}
          `;
        } else {
          const prefillBtn = result.prefill_url
            ? `<button onclick='navigator.clipboard.writeText(${escHtml(JSON.stringify(result.prefill_url))}); this.textContent="✓ Tersalin"' class="mt-2 btn-secondary btn-sm">Salin pre-filled link</button>`
            : '';
          container.innerHTML = `
            <p class="text-yellow-300/70">⚠ Belum mengisi form konfirmasi teknis</p>
            ${prefillBtn}
          `;
        }
      } catch (e) {
        console.error('[konfirmasi-teknis]', e.stack || e.message);
        container.innerHTML = `<p class="text-red-400">Error: ${escHtml(e.message)}</p>`;
      }
    }
  </script>
</body>
</html>
