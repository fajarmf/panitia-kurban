<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voucher - Panitia Kurban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1>🕌 Al Hijrah CGE</h1><p>Sistem Panitia Kurban</p></div>
    <nav class="sidebar-nav"></nav>
  </aside>
  <nav class="bottom-nav" id="bottom-nav"><div class="bottom-nav-items"></div></nav>

  <main class="main-content">
    <div class="top-bar">
      <div class="flex items-center gap-3">
        <button class="hamburger" onclick="toggleSidebar()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <h2>Kelola Voucher</h2>
      </div>
      <div class="user-info" id="user-info"></div>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4">
      <select id="event-filter" class="input-field" style="max-width:250px" onchange="loadVouchers()"></select>
      <select id="status-filter" class="input-field" style="max-width:180px" onchange="loadVouchers()">
        <option value="">Semua Status</option>
        <option value="ACTIVE">Aktif</option>
        <option value="CLAIMED">Diklaim</option>
        <option value="CANCELLED">Dibatalkan</option>
      </select>
      <input type="text" id="search-input" class="input-field" style="max-width:220px" placeholder="🔍 Cari kode voucher..." oninput="debounceSearch()">
      <div class="flex gap-2 ml-auto">
        <button class="btn-secondary" onclick="openBatchModal()">📦 Batch</button>
        <button class="btn-primary" onclick="openCreateModal()">+ Buat Voucher</button>
      </div>
    </div>

    <!-- Stats mini -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="glass-card p-3 text-center"><div class="text-xl font-bold text-emerald-300" id="v-total">0</div><div class="text-xs text-emerald-300/50">Total</div></div>
      <div class="glass-card p-3 text-center"><div class="text-xl font-bold text-blue-300" id="v-claimed">0</div><div class="text-xs text-emerald-300/50">Diklaim</div></div>
      <div class="glass-card p-3 text-center"><div class="text-xl font-bold text-green-300" id="v-active">0</div><div class="text-xs text-emerald-300/50">Aktif</div></div>
    </div>

    <div class="glass-card p-4">
      <div class="table-responsive">
        <table class="data-table">
          <thead><tr><th>Kode Voucher</th><th>Tanggal</th><th>Status</th><th class="hide-mobile">Dibuat</th><th>Aksi</th></tr></thead>
          <tbody id="vouchers-table"><tr><td colspan="5" class="text-center py-8"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Create Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-content">
      <div class="modal-header"><h3>Buat Voucher</h3><button class="modal-close" onclick="closeCreate()">✕</button></div>
      <form onsubmit="createVoucher(event)">
        <div class="form-group"><label>Event</label><select id="c-event" class="input-field" required></select></div>
        <div class="form-group"><label>Tanggal Distribusi</label><input type="date" id="c-date" class="input-field" required></div>
        <div class="flex gap-3 mt-6">
          <button type="button" class="btn-secondary flex-1" onclick="closeCreate()">Batal</button>
          <button type="submit" class="btn-primary flex-1">Buat</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Batch Modal -->
  <div class="modal-overlay" id="batch-modal">
    <div class="modal-content">
      <div class="modal-header"><h3>Batch Voucher</h3><button class="modal-close" onclick="closeBatch()">✕</button></div>
      <form onsubmit="createBatch(event)">
        <div class="form-group"><label>Event</label><select id="b-event" class="input-field" required></select></div>
        <div class="form-group"><label>Jumlah Voucher</label><input type="number" id="b-count" class="input-field" min="1" max="500" value="10" required></div>
        <div class="form-group"><label>Tanggal Distribusi</label><input type="date" id="b-date" class="input-field" required></div>
        <div class="flex gap-3 mt-6">
          <button type="button" class="btn-secondary flex-1" onclick="closeBatch()">Batal</button>
          <button type="submit" class="btn-primary flex-1" id="batch-btn">Buat Batch</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');
    initSidebar('vouchers');
    let searchTimeout;
    loadEventOptions('event-filter', true).then(() => loadVouchers());
    loadEventOptions('c-event');
    loadEventOptions('b-event');

    function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(loadVouchers, 400); }

    async function loadVouchers() {
      const eventId = document.getElementById('event-filter').value;
      const status = document.getElementById('status-filter').value;
      const search = document.getElementById('search-input').value;
      let params = [];
      if (eventId) params.push(`eventId=${eventId}`);
      if (status) params.push(`status=${status}`);
      if (search) params.push(`search=${search}`);
      const qs = params.length ? '?' + params.join('&') : '';
      try {
        const vouchers = await api(`/vouchers${qs}`);
        const stats = await api(`/vouchers/stats${eventId ? '?eventId=' + eventId : ''}`);
        document.getElementById('v-total').textContent = stats.total;
        document.getElementById('v-claimed').textContent = stats.claimed;
        document.getElementById('v-active').textContent = stats.active;
        const tbody = document.getElementById('vouchers-table');
        if (!vouchers.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-emerald-300/40">Tidak ada voucher</td></tr>'; return; }
        tbody.innerHTML = vouchers.map(v => `<tr>
          <td><span class="font-mono font-bold text-emerald-200">${v.voucherCode}</span></td>
          <td>${formatDate(v.distributionDate)}</td>
          <td><span class="badge badge-${v.status.toLowerCase()}">${v.status === 'ACTIVE' ? 'Aktif' : v.status === 'CLAIMED' ? 'Diklaim' : 'Batal'}</span></td>
          <td class="hide-mobile text-xs text-emerald-300/50">${formatDateTime(v.createdAt)}</td>
          <td><div class="flex gap-1 flex-wrap">
            <button class="btn-secondary btn-sm" onclick="downloadPdf('${v.id}','${v.voucherCode}')">📄 PDF</button>
            ${v.status === 'ACTIVE' ? `<button class="btn-danger btn-sm" onclick="deleteVoucher('${v.id}')">🗑</button>` : ''}
          </div></td>
        </tr>`).join('');
      } catch (err) { showToast('Gagal memuat voucher', 'error'); }
    }

    function openCreateModal() { document.getElementById('create-modal').classList.add('active'); }
    function closeCreate() { document.getElementById('create-modal').classList.remove('active'); }
    function openBatchModal() { document.getElementById('batch-modal').classList.add('active'); }
    function closeBatch() { document.getElementById('batch-modal').classList.remove('active'); }

    async function createVoucher(e) {
      e.preventDefault();
      try {
        await api('/vouchers', { method: 'POST', body: JSON.stringify({ eventId: document.getElementById('c-event').value, distributionDate: document.getElementById('c-date').value }) });
        showToast('Voucher dibuat'); closeCreate(); loadVouchers();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function createBatch(e) {
      e.preventDefault();
      const btn = document.getElementById('batch-btn');
      btn.disabled = true; btn.textContent = 'Memproses...';
      try {
        const result = await api('/vouchers/batch', { method: 'POST', body: JSON.stringify({ eventId: document.getElementById('b-event').value, count: parseInt(document.getElementById('b-count').value), distributionDate: document.getElementById('b-date').value }) });
        showToast(`${result.length} voucher berhasil dibuat!`); closeBatch(); loadVouchers();
      } catch (err) { showToast(err.message, 'error'); }
      btn.disabled = false; btn.textContent = 'Buat Batch';
    }

    async function downloadPdf(id, code) {
      try {
        const blob = await api(`/vouchers/${id}/pdf`);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `voucher-${code}.pdf`; a.click();
        URL.revokeObjectURL(url);
        showToast('PDF didownload');
      } catch (err) { showToast('Gagal download PDF', 'error'); }
    }

    async function deleteVoucher(id) {
      if (!confirmAction('Yakin ingin menghapus voucher ini?')) return;
      try { await api(`/vouchers/${id}`, { method: 'DELETE' }); showToast('Voucher dihapus'); loadVouchers(); }
      catch (err) { showToast(err.message, 'error'); }
    }
  </script>
</body>
</html>
