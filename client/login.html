<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Panitia Kurban Masjid Al Hijrah CGE</title>
  <meta name="description" content="Sistem manajemen panitia kurban Masjid Al Hijrah CGE">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="flex items-center justify-center min-h-screen p-4">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="login-card w-full max-w-md p-8 relative z-10">
    <!-- Logo area -->
    <div class="text-center mb-8">
      <div
        class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center shadow-lg">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-emerald-100">Masjid Al Hijrah CGE</h1>
      <p class="text-sm text-emerald-300/60 mt-1">Sistem Panitia Kurban</p>
    </div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div id="login-error"
        class="hidden bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg text-sm mb-4 text-center">
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="input-field" placeholder="Masukkan username" required
          autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="relative">
          <input type="password" id="password" class="input-field" placeholder="Masukkan password" required
            autocomplete="current-password">
          <button type="button" onclick="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-300/40 hover:text-emerald-300 transition-colors">
            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary w-full mt-4" id="login-btn">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
        </svg>
        Masuk
      </button>
    </form>

    <p class="text-center text-xs text-emerald-300/30 mt-6">© 2026 Panitia Kurban Masjid Al Hijrah CGE</p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) {
      window.location.href = '/dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorAlert = document.getElementById('login-error');

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px;"></div> Memproses...';
      if (errorAlert) errorAlert.classList.add('hidden');

      try {
        const data = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        setAuth(data.access_token, data.user);
        showToast('Login berhasil! Selamat datang, ' + data.user.fullName);
        setTimeout(() => window.location.href = '/dashboard.html', 500);
      } catch (err) {
        if (errorAlert) {
          errorAlert.textContent = 'Username atau password salah';
          errorAlert.classList.remove('hidden');
        }
        showToast('Username atau password salah', 'error');
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> Masuk';
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>

</html>
