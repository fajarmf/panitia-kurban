<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - Panitia Kurban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="login-card w-full max-w-md p-8 relative z-10">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-emerald-100">Lupa Password</h1>
      <p class="text-sm text-emerald-300/60 mt-1">Masukkan username Anda untuk mereset password.</p>
    </div>

    <form id="forgot-form" onsubmit="handleForgot(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="input-field" placeholder="Masukkan username" required>
      </div>
      <button type="submit" class="btn-primary w-full mt-4" id="submit-btn">Kirim Instruksi</button>
      <div class="text-center mt-4">
        <a href="/login.html" class="text-sm text-emerald-300 hover:text-emerald-100">Kembali ke Login</a>
      </div>
    </form>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:0;border-width:2px;"></div>';

      try {
        const data = await api('/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ username: document.getElementById('username').value })
        }, false);
        showToast(data.message || 'Instruksi dikirim. Silakan cek console server.', 'success');
        document.getElementById('forgot-form').reset();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Kirim Instruksi';
      }
    }
  </script>
</body>
</html>
