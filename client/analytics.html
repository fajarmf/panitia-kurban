<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistik Kunjungan - Panitia Kurban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1>🕌 Al Hijrah CGE</h1><p>Sistem Panitia Kurban</p></div>
    <nav class="sidebar-nav"></nav>
  </aside>
  <nav class="bottom-nav" id="bottom-nav"><div class="bottom-nav-items"></div></nav>

  <main class="main-content">
    <div class="top-bar">
      <div class="flex items-center gap-3">
        <button class="hamburger" onclick="toggleSidebar()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <h2>Statistik Kunjungan</h2>
      </div>
      <div class="user-info" id="user-info"></div>
    </div>

    <!-- Funnel -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4" id="funnel-cards">
      <div class="glass-card p-4 text-center">
        <div class="text-2xl font-bold text-emerald-300" id="funnel-visits">—</div>
        <div class="text-xs text-white/50 mt-1">Sesi Unik Buka Form</div>
      </div>
      <div class="glass-card p-4 text-center">
        <div class="text-2xl font-bold text-sky-300" id="funnel-reg">—</div>
        <div class="text-xs text-white/50 mt-1">Pendaftaran Masuk</div>
      </div>
      <div class="glass-card p-4 text-center">
        <div class="text-2xl font-bold text-yellow-300" id="funnel-proof">—</div>
        <div class="text-xs text-white/50 mt-1">Bukti Diunggah</div>
      </div>
      <div class="glass-card p-4 text-center">
        <div class="text-2xl font-bold text-green-300" id="funnel-confirmed">—</div>
        <div class="text-xs text-white/50 mt-1">Terkonfirmasi</div>
      </div>
    </div>

    <!-- Per-page visits -->
    <div class="glass-card p-4 mb-4">
      <h3 class="font-bold text-emerald-100 mb-3">Kunjungan per Halaman</h3>
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr>
              <th>Halaman</th>
              <th class="text-right">Total Kunjungan</th>
              <th class="text-right">Sesi Unik</th>
            </tr>
          </thead>
          <tbody id="per-page-table">
            <tr><td colspan="3" class="text-center py-6"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Daily visits table (last 30 days) -->
    <div class="glass-card p-4">
      <h3 class="font-bold text-emerald-100 mb-3">Kunjungan Harian (30 Hari Terakhir)</h3>
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Halaman</th>
              <th class="text-right">Total</th>
              <th class="text-right">Unik</th>
            </tr>
          </thead>
          <tbody id="daily-table">
            <tr><td colspan="4" class="text-center py-6"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');
    initSidebar('analytics');

    const pageLabels = {
      daftar: 'Form Pendaftaran',
      status: 'Cek Status',
      success: 'Pendaftaran Berhasil',
    };

    async function loadStats() {
      try {
        const data = await api('/analytics/stats');

        // Funnel
        document.getElementById('funnel-visits').textContent = data.funnel.daftarVisits;
        document.getElementById('funnel-reg').textContent = data.funnel.registrations;
        document.getElementById('funnel-proof').textContent = data.funnel.proofUploaded;
        document.getElementById('funnel-confirmed').textContent = data.funnel.confirmed;

        // Per-page
        const perPageBody = document.getElementById('per-page-table');
        if (!data.perPage.length) {
          perPageBody.innerHTML = '<tr><td colspan="3" class="text-center py-6 text-white/30">Belum ada data</td></tr>';
        } else {
          perPageBody.innerHTML = data.perPage.map(r => `
            <tr>
              <td>${pageLabels[r.page] || r.page}</td>
              <td class="text-right font-mono">${r.total}</td>
              <td class="text-right font-mono text-emerald-300">${r.unique}</td>
            </tr>
          `).join('');
        }

        // Daily
        const dailyBody = document.getElementById('daily-table');
        if (!data.daily.length) {
          dailyBody.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-white/30">Belum ada data</td></tr>';
        } else {
          dailyBody.innerHTML = data.daily.map(r => `
            <tr>
              <td class="text-xs text-white/60">${new Date(r.date).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' })}</td>
              <td>${pageLabels[r.page] || r.page}</td>
              <td class="text-right font-mono">${r.total}</td>
              <td class="text-right font-mono text-emerald-300">${r.unique}</td>
            </tr>
          `).join('');
        }
      } catch (err) {
        showToast('Gagal memuat statistik: ' + err.message, 'error');
      }
    }

    loadStats();
  </script>
</body>
</html>
